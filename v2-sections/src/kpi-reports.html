<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI — Reports & Equipment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="kpi-style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="two-col">
    <div class="chart-card">
      <div class="chart-head">
        <div class="chart-title">Weekly Reports</div>
        <div class="legend">
          <div class="legend-item"><div class="dot" style="background:var(--emerald)"></div>Automated</div>
          <div class="legend-item"><div class="dot" style="background:var(--amber)"></div>Manual</div>
        </div>
      </div>
      <div style="position:relative;height:200px"><canvas id="rpChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-head">
        <div class="chart-title">Active Equipment</div>
        <div class="legend">
          <div class="legend-item"><div class="dot" style="background:var(--indigo)"></div>Units active</div>
        </div>
      </div>
      <div style="position:relative;height:200px"><canvas id="eqChart"></canvas></div>
    </div>
  </div>

  <script src="kpi-data.js"></script>
  <script>
    const TICK   = { color: '#9CA3AF', font: { size: 11, family: "'IBM Plex Sans', sans-serif" } };
    const labels = RAW.map(r => r[0]);
    const TT = {
      backgroundColor: '#1F2937', titleColor: '#F3F4F6', bodyColor: '#D1D5DB',
      borderColor: '#374151', borderWidth: 1, padding: 10, cornerRadius: 6,
      callbacks: { label: ctx => ctx.raw == null ? null : ` ${ctx.dataset.label}: ${ctx.raw.toLocaleString()}` }
    };

    // Reports — stacked bar
    new Chart(document.getElementById('rpChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Automated', data: RAW.map(r => r[3]),
            backgroundColor: 'rgba(16,185,129,0.75)', borderWidth: 0,
            borderRadius: { topLeft:0, topRight:0, bottomLeft:2, bottomRight:2 }, borderSkipped: false },
          { label: 'Manual', data: RAW.map(r => r[4]),
            backgroundColor: 'rgba(245,158,11,0.75)', borderWidth: 0,
            borderRadius: { topLeft:2, topRight:2, bottomLeft:0, bottomRight:0 }, borderSkipped: false }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, tooltip: TT },
        scales: {
          x: { stacked: true, grid: { display: false }, border: { display: false },
               ticks: { ...TICK, maxTicksLimit: 8, maxRotation: 0 } },
          y: { stacked: true, grid: { color: '#F0F1F3' }, border: { display: false }, ticks: TICK }
        }
      }
    });

    // Equipment — line
    const eqCtx  = document.getElementById('eqChart').getContext('2d');
    const eqGrad = eqCtx.createLinearGradient(0, 0, 0, 280);
    eqGrad.addColorStop(0, 'rgba(79,70,229,0.12)');
    eqGrad.addColorStop(1, 'rgba(79,70,229,0)');

    new Chart(eqCtx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Equipment', data: RAW.map(r => r[2]),
          borderColor: '#4F46E5', borderWidth: 2,
          backgroundColor: eqGrad, fill: true, tension: 0.35,
          pointRadius: 0, pointHoverRadius: 5,
          pointHoverBackgroundColor: '#4F46E5', pointHoverBorderColor: '#fff', pointHoverBorderWidth: 2,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, tooltip: TT },
        scales: {
          x: { grid: { display: false }, border: { display: false },
               ticks: { ...TICK, maxTicksLimit: 8, maxRotation: 0 } },
          y: { grid: { color: '#F0F1F3' }, border: { display: false }, ticks: TICK }
        }
      }
    });
  </script>
</body>
</html>
