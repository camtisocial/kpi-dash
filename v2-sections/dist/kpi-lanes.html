<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI — Lane Miles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --surface:  #FFFFFF;
  --border:   #E5E7EB;
  --text:     #111827;
  --muted:    #6B7280;
  --faint:    #9CA3AF;
  --rule:     #F3F4F6;
  --blue:     #1D4ED8;
  --green:    #059669;
  --red:      #DC2626;
  --amber:    #D97706;
  --indigo:   #4F46E5;
  --cyan:     #0891B2;
  --pink:     #DB2777;
  --violet:   #7C3AED;
  --emerald:  #10B981;
  --radius:   10px;
  --shadow:   0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}

body {
  font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #ffffff;
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  padding: 14px 16px;
  height: 100vh;
  overflow: hidden;
}

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
}

/* Stat cards */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.stat-label {
  font-size: 11px; font-weight: 500;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 6px;
}
.stat-value {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 24px; font-weight: 500;
  line-height: 1;
  margin-bottom: 6px;
}
.stat-change { font-size: 12px; font-weight: 500; }
.stat-change.up   { color: var(--green); }
.stat-change.down { color: var(--red); }
.change-sub { color: var(--faint); font-weight: 400; }

/* Chart cards */
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px 10px;
  box-shadow: var(--shadow);
}
.chart-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 6px;
}
.chart-title { font-size: 13px; font-weight: 600; }
.legend { display: flex; gap: 10px; flex-wrap: wrap; }
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted);
}
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Annual */
.section-label {
  font-size: 11px; font-weight: 600;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 8px;
}
.annual-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.annual-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  box-shadow: var(--shadow);
}
.annual-year { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
.annual-val  {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 17px; font-weight: 500; margin-bottom: 8px;
}
.bar-bg  { height: 3px; background: var(--rule); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
.bar-fill { height: 100%; background: var(--blue); border-radius: 2px; }
.annual-growth { font-size: 11px; font-weight: 500; color: var(--green); }
.annual-base   { font-size: 11px; color: var(--faint); }

/* Chart.js shared options injected via JS */
.gap { height: 10px; }

@media (max-width: 600px) {
  .stat-grid    { grid-template-columns: repeat(2, 1fr); }
  .two-col      { grid-template-columns: 1fr; }
  .annual-grid  { grid-template-columns: repeat(2, 1fr); }
}

</style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="chart-card">
    <div class="chart-head">
      <div class="chart-title">Weekly Lane Miles</div>
      <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--blue)"></div>Lane miles processed</div>
      </div>
    </div>
    <div style="position:relative;height:220px"><canvas id="chart"></canvas></div>
  </div>

  <script>
// Auto-generated by tools/refresh.py — do not edit manually
// [date, volumeIndex, activeUnits, typeA, typeB, total, app, web, monthlyActive]
const RAW = [
  ["Jan 7 '26", 0, 2, 1, 0, 1, null, null, null],
  ["Jan 14 '26", 2, 4, 2, 0, 2, null, null, null],
  ["Jan 21 '26", 2, 5, 2, 1, 3, null, null, null],
  ["Jan 28 '26", 2, 4, 2, 0, 2, 1, 2, 2],
  ["Feb 4 '26", 3, 5, 2, 1, 3, 1, 2, 2],
  ["Feb 11 '26", 3, 5, 2, 1, 3, 1, 2, 2],
  ["Feb 18 '26", 4, 6, 2, 1, 3, 2, 2, 3],
  ["Feb 25 '26", 4, 6, 2, 1, 3, 2, 2, 3],
  ["Mar 4 '26", 4, 7, 3, 1, 4, 2, 3, 3],
  ["Mar 11 '26", 5, 7, 3, 1, 4, 2, 3, 4],
  ["Mar 18 '26", 5, 8, 4, 1, 5, 3, 3, 4],
  ["Mar 25 '26", 6, 8, 4, 1, 5, 3, 3, 4],
  ["Apr 1 '26", 6, 9, 4, 1, 5, 3, 4, 4],
  ["Apr 8 '26", 7, 9, 5, 2, 7, 3, 4, 5],
  ["Apr 15 '26", 7, 9, 5, 2, 7, 3, 4, 5],
  ["Apr 22 '26", 7, 9, 5, 2, 7, 3, 4, 5],
  ["Apr 29 '26", 8, 9, 5, 2, 7, 4, 4, 5],
  ["May 6 '26", 8, 10, 6, 2, 8, 4, 4, 6],
  ["May 13 '26", 9, 10, 6, 2, 8, 4, 4, 6],
  ["May 20 '26", 9, 10, 6, 2, 8, 4, 4, 6],
  ["May 27 '26", 9, 10, 6, 2, 9, 4, 4, 6],
  ["Jun 3 '26", 10, 10, 7, 2, 9, 4, 5, 6],
];

</script>
  <script>
    const TICK = { color: '#9CA3AF', font: { size: 11, family: "'IBM Plex Sans', sans-serif" } };
    const ctx  = document.getElementById('chart').getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 280);
    grad.addColorStop(0, 'rgba(29,78,216,0.18)');
    grad.addColorStop(1, 'rgba(29,78,216,0)');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: RAW.map(r => r[0]),
        datasets: [{
          label: 'Lane Miles',
          data: RAW.map(r => r[1]),
          borderColor: '#1D4ED8',
          borderWidth: 2,
          backgroundColor: grad,
          fill: true,
          tension: 0.35,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: '#1D4ED8',
          pointHoverBorderColor: '#fff',
          pointHoverBorderWidth: 2,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1F2937', titleColor: '#F3F4F6', bodyColor: '#D1D5DB',
            borderColor: '#374151', borderWidth: 1, padding: 10, cornerRadius: 6,
            callbacks: { label: ctx => ` Lane Miles: ${ctx.raw.toLocaleString()}` }
          }
        },
        scales: {
          x: {
            grid: { display: false }, border: { display: false },
            ticks: { ...TICK, maxTicksLimit: 10, maxRotation: 0 }
          },
          y: {
            grid: { color: '#F0F1F3' }, border: { display: false },
            ticks: { ...TICK, callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v }
          }
        }
      }
    });
  </script>
</body>
</html>
