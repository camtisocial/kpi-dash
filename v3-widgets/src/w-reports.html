<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Output Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/kpi-style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="chart-card">
    <div class="chart-head">
      <div class="chart-title">Output Log</div>
      <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--emerald)"></div>Type A</div>
        <div class="legend-item"><div class="dot" style="background:var(--amber)"></div>Type B</div>
      </div>
    </div>
    <div style="position:relative;height:calc(100vh - 62px)"><canvas id="chart"></canvas></div>
  </div>

  <script src="../../shared/kpi-data.js"></script>
  <script>
    const TICK = { color: '#9CA3AF', font: { size: 11, family: "'IBM Plex Sans', sans-serif" } };

    new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: {
        labels: RAW.map(r => r[0]),
        datasets: [
          { label: "Type A", data: RAW.map(r => r[3]),
            backgroundColor: 'rgba(16,185,129,0.75)', borderWidth: 0,
            borderRadius: { topLeft:0, topRight:0, bottomLeft:2, bottomRight:2 },
            borderSkipped: false },
          { label: "Type B", data: RAW.map(r => r[4]),
            backgroundColor: 'rgba(245,158,11,0.75)', borderWidth: 0,
            borderRadius: { topLeft:2, topRight:2, bottomLeft:0, bottomRight:0 },
            borderSkipped: false }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1F2937', titleColor: '#F3F4F6', bodyColor: '#D1D5DB',
            borderColor: '#374151', borderWidth: 1, padding: 10, cornerRadius: 6,
            callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.raw.toLocaleString()}` }
          }
        },
        scales: {
          x: { stacked: true, grid: { display: false }, border: { display: false },
               ticks: { ...TICK, maxTicksLimit: 10, maxRotation: 0 } },
          y: { stacked: true, grid: { color: '#F0F1F3' }, border: { display: false },
               ticks: TICK }
        }
      }
    });
  </script>
</body>
</html>
