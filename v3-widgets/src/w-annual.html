<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annual Volume Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/kpi-style.css">
</head>
<body>
  <div class="section-label">Annual Volume Index</div>
  <div class="annual-grid">
    <div class="annual-card">
      <div class="annual-year">2021</div>
      <div class="annual-val">118,432</div>
      <div class="bar-bg"><div class="bar-fill" style="width:38%"></div></div>
      <div class="annual-base">Baseline year</div>
    </div>
    <div class="annual-card">
      <div class="annual-year">2022</div>
      <div class="annual-val">193,667</div>
      <div class="bar-bg"><div class="bar-fill" style="width:65%"></div></div>
      <div class="annual-growth">+64% YoY</div>
    </div>
    <div class="annual-card">
      <div class="annual-year">2023</div>
      <div class="annual-val">251,840</div>
      <div class="bar-bg"><div class="bar-fill" style="width:83%"></div></div>
      <div class="annual-growth">+30% YoY</div>
    </div>
    <div class="annual-card">
      <div class="annual-year">2024</div>
      <div class="annual-val">308,119</div>
      <div class="bar-bg"><div class="bar-fill" style="width:100%"></div></div>
      <div class="annual-growth">+22% YoY</div>
    </div>
  </div>
</body>
</html>
