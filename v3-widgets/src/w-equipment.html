<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Active Units</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/kpi-style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="chart-card">
    <div class="chart-head">
      <div class="chart-title">Active Units</div>
      <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--indigo)"></div>Units online</div>
      </div>
    </div>
    <div style="position:relative;height:calc(100vh - 62px)"><canvas id="chart"></canvas></div>
  </div>

  <script src="../../shared/kpi-data.js"></script>
  <script>
    const TICK = { color: '#9CA3AF', font: { size: 11, family: "'IBM Plex Sans', sans-serif" } };
    const ctx  = document.getElementById('chart').getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 280);
    grad.addColorStop(0, 'rgba(79,70,229,0.12)');
    grad.addColorStop(1, 'rgba(79,70,229,0)');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: RAW.map(r => r[0]),
        datasets: [{
          label: 'Equipment',
          data: RAW.map(r => r[2]),
          borderColor: '#4F46E5',
          borderWidth: 2,
          backgroundColor: grad,
          fill: true,
          tension: 0.35,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: '#4F46E5',
          pointHoverBorderColor: '#fff',
          pointHoverBorderWidth: 2,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1F2937', titleColor: '#F3F4F6', bodyColor: '#D1D5DB',
            borderColor: '#374151', borderWidth: 1, padding: 10, cornerRadius: 6,
            callbacks: { label: ctx => ` Equipment: ${ctx.raw.toLocaleString()}` }
          }
        },
        scales: {
          x: { grid: { display: false }, border: { display: false },
               ticks: { ...TICK, maxTicksLimit: 10, maxRotation: 0 } },
          y: { grid: { color: '#F0F1F3' }, border: { display: false }, ticks: TICK }
        }
      }
    });
  </script>
</body>
</html>
